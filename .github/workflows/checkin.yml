name: GLaDOS 2026 Checkin

on:
  schedule:
    # 北京时间 9:30 (UTC 1:30)
    - cron: '30 1 * * *'
    # 北京时间 21:30 (UTC 13:30)
    - cron: '30 13 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]  # 推送时也触发，保持活跃

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ---------- 账号1 ----------
      - name: Checkin Account 1
        run: python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

      - name: Retry Account 1 on Failure
        if: failure()
        run: |
          echo "Account 1 first attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

      # ---------- 账号2 ----------
      - name: Checkin Account 2
        run: python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE_2 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

      - name: Retry Account 2 on Failure
        if: failure()
        run: |
          echo "Account 2 first attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE_2 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
